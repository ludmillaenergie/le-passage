<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Passage — Ludmilla Énergie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Allura&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #09070a;
    color: #e8e0d8;
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .ecran { text-align: center; max-width: 460px; width: 100%; }
  .sur-titre {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 42px;
    color: #f0e6d8;
    margin-bottom: 32px;
  }
  input, textarea {
    width: 100%;
    padding: 14px 16px;
    background: #1a1420;
    border: 1px solid #2a2030;
    color: #e8e0d8;
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    border-radius: 4px;
    margin-bottom: 16px;
  }
  input { text-align: center; letter-spacing: 1px; }
  textarea { text-align: left; min-height: 140px; resize: vertical; line-height: 1.6; }
  input:focus, textarea:focus { outline: none; border-color: #c8a96e; }
  button {
    width: 100%;
    padding: 14px;
    background: #c8a96e;
    color: #09070a;
    border: none;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { background: #d8bc85; }
  button:disabled { opacity: 0.5; cursor: default; }
  .msg-erreur { color: #c88a6e; font-size: 13px; margin-top: 12px; min-height: 18px; }
  .mention {
    font-family: 'Raleway', sans-serif;
    font-size: 11px; color: #8a7a6a; margin-top: 24px; opacity: 0.7;
    max-width: 280px; margin-left: auto; margin-right: auto;
  }
  .accueil-nom {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 20px;
    color: #c8a96e;
    margin-bottom: 24px;
  }
  #ecran-recit, #ecran-resultat { display: none; }
  .resultat-texte {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 19px;
    line-height: 1.8;
    color: #f0e6d8;
    text-align: left;
    margin-bottom: 24px;
  }
</style>
</head>
<body>

<div class="ecran" id="ecran-code">
  <div class="sur-titre">Ludmilla Énergie</div>
  <h1>Le Passage</h1>
  <input type="text" id="input-code" placeholder="Ton code d'accès" autocomplete="off" autocapitalize="characters">
  <button onclick="verifierCode()">Entrer</button>
  <div class="msg-erreur" id="msg-erreur"></div>
  <p class="mention">Cet espace accompagne un chemin intérieur. Il ne remplace pas un avis médical ou professionnel.</p>
</div>

<div class="ecran" id="ecran-recit">
  <div class="sur-titre">Ludmilla Énergie</div>
  <p class="accueil-nom" id="accueil-nom"></p>
  <textarea id="input-recit" placeholder="Raconte librement ce que tu traverses en ce moment..."></textarea>
  <button onclick="analyserRecit()" id="btn-recit">Continuer</button>
  <div class="msg-erreur" id="msg-erreur-recit"></div>
  <p class="mention">Cet espace accompagne un chemin intérieur. Il ne remplace pas un avis médical ou professionnel.</p>
</div>

<div class="ecran" id="ecran-resultat">
  <div class="sur-titre">Ludmilla Énergie</div>
  <p class="resultat-texte" id="resultat-texte"></p>
</div>

<script>
const WORKER_URL = "https://le-passage.ludmillaenergie.workers.dev";

async function verifierCode() {
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  const msgErreur = document.getElementById('msg-erreur');
  msgErreur.textContent = '';

  if (!code) {
    msgErreur.textContent = "Merci d'entrer ton code d'accès.";
    return;
  }

  try {
    const reponse = await fetch(WORKER_URL + '/verify-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await reponse.json();

    if (data.valide) {
      localStorage.setItem('lepassage_code', code);
      localStorage.setItem('lepassage_personne', JSON.stringify(data.personne));
      document.getElementById('ecran-code').style.display = 'none';
      document.getElementById('ecran-recit').style.display = 'block';
      document.getElementById('accueil-nom').textContent = data.personne.prenom + ", qu'est-ce qui t'amène aujourd'hui ?";
    } else {
      msgErreur.textContent = "Ce code n'est pas reconnu.";
    }
  } catch (e) {
    msgErreur.textContent = "Une erreur est survenue, réessaie.";
  }
}

async function analyserRecit() {
  const recit = document.getElementById('input-recit').value.trim();
  const msgErreur = document.getElementById('msg-erreur-recit');
  const btn = document.getElementById('btn-recit');
  msgErreur.textContent = '';

  if (!recit) {
    msgErreur.textContent = "Raconte-moi ce que tu traverses avant de continuer.";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Un instant...";

  try {
    const reponse = await fetch(WORKER_URL + '/analyser-recit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recit })
    });
    const data = await reponse.json();

    document.getElementById('ecran-recit').style.display = 'none';
    document.getElementById('ecran-resultat').style.display = 'block';
    const nomOracle = data.oracle === 'evidences' ? "l'Oracle des Évidences" : "l'Oracle de Traversée";
    document.getElementById('resultat-texte').textContent = "Ce que tu portes appelle " + nomOracle + ". " + data.raison;
  } catch (e) {
    msgErreur.textContent = "Une erreur est survenue, réessaie.";
    btn.disabled = false;
    btn.textContent = "Continuer";
  }
}

document.getElementById('input-code').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') verifierCode();
});
</script>

</body>
</html>
