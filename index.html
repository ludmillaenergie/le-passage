<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Le Passage — Ludmilla Énergie</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Allura&family=Raleway:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #09070a;
    color: #e8e0d8;
    font-family: 'Raleway', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #ecran-code {
    text-align: center;
    max-width: 380px;
  }
  .sur-titre {
    font-family: 'Raleway', sans-serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a96e;
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 42px;
    color: #f0e6d8;
    margin-bottom: 32px;
  }
  input {
    width: 100%;
    padding: 14px 16px;
    background: #1a1420;
    border: 1px solid #2a2030;
    color: #e8e0d8;
    font-family: 'Raleway', sans-serif;
    font-size: 15px;
    border-radius: 4px;
    text-align: center;
    letter-spacing: 1px;
    margin-bottom: 16px;
  }
  input:focus { outline: none; border-color: #c8a96e; }
  button {
    width: 100%;
    padding: 14px;
    background: #c8a96e;
    color: #09070a;
    border: none;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border-radius: 4px;
    cursor: pointer;
  }
  button:hover { background: #d8bc85; }
  .msg-erreur {
    color: #c88a6e;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
  .mention {
    font-family: 'Raleway', sans-serif;
    font-size: 11px;
    color: #8a7a6a;
    margin-top: 24px;
    opacity: 0.7;
    max-width: 280px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>

<div id="ecran-code">
  <div class="sur-titre">Ludmilla Énergie</div>
  <h1>Le Passage</h1>
  <input type="text" id="input-code" placeholder="Ton code d'accès" autocomplete="off" autocapitalize="characters">
  <button onclick="verifierCode()">Entrer</button>
  <div class="msg-erreur" id="msg-erreur"></div>
  <p class="mention">Cet espace accompagne un chemin intérieur. Il ne remplace pas un avis médical ou professionnel.</p>
</div>

<script>
const WORKER_URL = "https://le-passage.ludmillaenergie.workers.dev";

async function verifierCode() {
  const code = document.getElementById('input-code').value.trim().toUpperCase();
  const msgErreur = document.getElementById('msg-erreur');
  msgErreur.textContent = '';

  if (!code) {
    msgErreur.textContent = "Merci d'entrer ton code d'accès.";
    return;
  }

  try {
    const reponse = await fetch(WORKER_URL + '/verify-code', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await reponse.json();

    if (data.valide) {
      localStorage.setItem('lepassage_code', code);
      localStorage.setItem('lepassage_personne', JSON.stringify(data.personne));
      msgErreur.style.color = '#8ec89a';
      msgErreur.textContent = "Bienvenue, " + data.personne.prenom + ".";
    } else {
      msgErreur.textContent = "Ce code n'est pas reconnu.";
    }
  } catch (e) {
    msgErreur.textContent = "Une erreur est survenue, réessaie.";
  }
}

document.getElementById('input-code').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') verifierCode();
});
</script>

</body>
</html>
